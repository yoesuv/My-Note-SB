spring.application.name=My Notes Test

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mynotes}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=dbo

spring.flyway.enabled=false

jwt.secret=${JWT_SECRET:dGVzdC1zZWNyZXQtandrLWtleS1mb3ItdGVzdGluZy1wdXJwb3Nlcy1vbmx5LWF0LWxlYXN0LTI1Ni1iaXRz}
jwt.expiration=31536000000
spring.application.name=My Notes
spring.config.import=optional:file:./local.properties

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mynotes}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Configuration
jwt.secret=${JWT_SECRET:my-secret-key-change-in-production}
jwt.expiration=31536000000